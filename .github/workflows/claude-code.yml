name: Claude Code — AI 协作

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  claude-code:
    name: Claude Code 执行
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # issue/PR comment 包含 @claude 时触发，或 PR 开启/更新时自动 review，或手动触发
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.INNER_LOOP_GITHUB_TOKEN }}

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.INNER_LOOP_GITHUB_TOKEN }}
          # PR 自动 review 时使用 code-review 技能；@claude 手动触发时响应 comment 内容
          prompt: |
            ${{ github.event_name == 'pull_request' && '/code-review:code-review' || '' }}
          claude_args: |
            --model claude-sonnet-4-5
            --append-system-prompt "你是 ONIT 前端工程师。遵守 CLAUDE.md 中的所有约束。"
            --max-turns 20
