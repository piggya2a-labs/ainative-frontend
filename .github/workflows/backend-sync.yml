name: Backend Change → Frontend Sync

# agent-gateway push 到 supabase/functions 时，
# notify-frontend.yml 会发一个 repository_dispatch 事件触发这里。
# Claude 读取 diff，分析前端需要跟进什么，自动开 PR 或记录 issue。

on:
  repository_dispatch:
    types: [backend-updated]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'agent-gateway commit SHA（用于手动测试）'
        required: false
        default: ''
      commit_msg:
        description: 'commit 描述'
        required: false
        default: 'Manual trigger'
      changed_files:
        description: '变更文件列表（逗号分隔）'
        required: false
        default: 'supabase/functions/channel-telegram/index.ts'

jobs:
  analyze-and-sync:
    name: Claude 分析后端变化 → 开 PR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.INNER_LOOP_GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 配置 git
        run: |
          git config user.email "sync-agent@ainative.ai"
          git config user.name  "Backend Sync Agent"
          git remote set-url origin https://x-access-token:${{ secrets.INNER_LOOP_GITHUB_TOKEN }}@github.com/piggya2a-labs/ainative-frontend.git

      - name: 运行 Backend Sync Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.INNER_LOOP_GITHUB_TOKEN }}
          COMMIT_SHA:        ${{ github.event.client_payload.commit_sha  || github.event.inputs.commit_sha  || '' }}
          COMMIT_MSG:        ${{ github.event.client_payload.commit_msg  || github.event.inputs.commit_msg  || 'Manual trigger' }}
          CHANGED_FILES:     ${{ github.event.client_payload.changed_files || github.event.inputs.changed_files || '' }}
          DIFF_URL:          ${{ github.event.client_payload.diff_url    || '' }}
        run: python3 agents/backend_sync_agent.py
